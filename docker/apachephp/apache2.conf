# ─────────────────────────────────────────────────────
# apache2.conf - Configuración Apache para F1 Fantasy
# ─────────────────────────────────────────────────────

ServerRoot "/etc/apache2"

# Puerto de escucha
Listen 80

# Módulos esenciales
LoadModule mpm_prefork_module /usr/lib/apache2/modules/mod_mpm_prefork.so
LoadModule authz_core_module   /usr/lib/apache2/modules/mod_authz_core.so
LoadModule authz_host_module   /usr/lib/apache2/modules/mod_authz_host.so
LoadModule mime_module         /usr/lib/apache2/modules/mod_mime.so
LoadModule env_module          /usr/lib/apache2/modules/mod_env.so
LoadModule setenvif_module     /usr/lib/apache2/modules/mod_setenvif.so
LoadModule rewrite_module      /usr/lib/apache2/modules/mod_rewrite.so
LoadModule headers_module      /usr/lib/apache2/modules/mod_headers.so
LoadModule dir_module          /usr/lib/apache2/modules/mod_dir.so
LoadModule alias_module        /usr/lib/apache2/modules/mod_alias.so
LoadModule php_module          /usr/lib/apache2/modules/libphp.so

# Usuario y grupo de Apache
User  ${APACHE_RUN_USER}
Group ${APACHE_RUN_GROUP}

# Nombre del servidor
ServerName localhost

# Ocultar versión de Apache (seguridad)
ServerTokens Prod
ServerSignature Off

# Logs
ErrorLog  ${APACHE_LOG_DIR}/error.log
LogLevel  warn
LogFormat "%h %l %u %t \"%r\" %>s %b" combined
CustomLog ${APACHE_LOG_DIR}/access.log combined

# Tipos MIME
TypesConfig /etc/mime.types
AddType application/x-httpd-php .php

# Directorio raíz del servidor
DocumentRoot "/var/www/html/public"

# Denegar acceso fuera del DocumentRoot
<Directory />
    Options None
    AllowOverride None
    Require all denied
</Directory>

# Carpeta web principal
<Directory "/var/www/html/public">
    Options FollowSymLinks
    AllowOverride All
    Require all granted
    RewriteEngine On
</Directory>

# Índice de directorios
DirectoryIndex index.php index.html

# Solo conf-enabled (excluimos sites-enabled para evitar que 000-default.conf
# sobreescriba el DocumentRoot)
IncludeOptional /etc/apache2/conf-enabled/*.conf
