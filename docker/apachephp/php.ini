; ─────────────────────────────────────────────────────
; php.ini - Configuración PHP para F1 Fantasy
; ─────────────────────────────────────────────────────

[PHP]
; Tiempo máximo de ejecución de scripts (segundos)
max_execution_time = 120

; Memoria máxima por script
memory_limit = 512M

; Tamaño máximo de datos POST
post_max_size = 20M

; Tamaño máximo de archivos subidos
upload_max_filesize = 20M

; Mostrar errores en pantalla (desactivar en producción)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Guardar errores en log
log_errors = On
error_log = /var/log/apache2/php_errors.log

; Zona horaria (según el curso, Arcipreste de Hita, Guadalajara)
date.timezone = Europe/Madrid

; Codificación interna
default_charset = UTF-8
mbstring.internal_encoding = UTF-8

; Sesiones
session.gc_maxlifetime = 3600
session.cookie_httponly = 1
session.use_strict_mode = 1

; Habilitar funciones de URL (necesario para file_get_contents con URLs)
allow_url_fopen = On
